<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ sarlavha }}</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link href="{% static 'bootstrap/css/bootstrap.min.css' %}" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>

<div>
    {# menu #}
<nav class="navbar navbar-expand-lg navbar-light bg-dark">
  <div class="container-fluid">
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav d-flex">
        <li class="nav-item">
          <a class="nav-link active text-white" aria-current="page" href="{% url 'news' %}">Home</a>
        </li>
        {% for category in categories %}
        <li class="nav-item">
            <a class="nav-link text-white" href="{% url 'by_category' category.id %}">{{ category.name }}</a>
        </li>
        {% endfor %}
      <form class="d-flex" role="search">
      <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
      <button class="btn btn-outline-success" type="submit">Search</button>
    </form>
      </ul>
    </div>
  </div>
</nav>
</div>
<div class="accordion" id="accordionExample">
  {% for article in articles %}
  <div class="accordion-item">
    <h2 class="accordion-header" id="heading{{ article.id }}">
      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{ article.id }}" aria-expanded="false" aria-controls="collapse{{ article.id }}">
        {{ article.title }}
      </button>
    </h2>
    <div id="collapse{{ article.id }}" class="accordion-collapse collapse" aria-labelledby="heading{{ article.id }}" data-bs-parent="#accordionExample">
      <div class="accordion-body">
            <p>
                {{ article.content }}
            </p>
            <img class="image" src="{{ article.get_image }}">
            <br>
            <small>
                Ko'rishlar: {{ article.view_count }}
            </small>
            <br>
            <a href="{% url 'new_detail' article.id %}" class="btn btn-primary mt-2">Batafsil o'qish</a>
      </div>
    </div>
  </div>
    {% endfor %}
</div>

<script src="{% static 'bootstrap/js/bootstrap.bundle.min.js'%}" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
