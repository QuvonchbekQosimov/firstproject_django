<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ sarlavha }}</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<body>

<div>
    {# menu #}
    <ul type="none" class="menu">
    <li>
            <a href="{% url 'news' %}">
                Home
            </a>
        </li>
        {% for category in categories %}
        <li>
            <a href="{% url 'by_category' category.id %}">
                {{ category.name }}
            </a>
        </li>
        {% endfor %}
    <li>
            <a href="#">
                Login
            </a>
        </li>
    </ul>
</div>
<div class="accordion" id="accordionExample">
  {% for article in articles %}
  <div class="accordion-item">
    <h2 class="accordion-header" id="heading{{ article.id }}">
      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{ article.id }}" aria-expanded="false" aria-controls="collapse{{ article.id }}">
        {{ article.title }}
      </button>
    </h2>
    <div id="collapse{{ article.id }}" class="accordion-collapse collapse" aria-labelledby="heading{{ article.id }}" data-bs-parent="#accordionExample">
      <div class="accordion-body">
          <a href="{% url 'new_detail' article.id %}">
                <h1>
                    {{ article.title }}
                </h1>
            </a>
            <p>
                {{ article.content }}
            </p>
            <img class="image" src="{{ article.get_image }}">
            <br>
            <small>
                Ko'rishlar: {{ article.view_count }}
            </small>
      </div>
    </div>
  </div>
    {% endfor %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
